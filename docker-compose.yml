name: orik

services:
  orik:
    build:
      context: .
      dockerfile: Dockerfile
    image: orik:latest
    container_name: orik
    restart: unless-stopped
    ports:
      - "13120:13120"
    volumes:
      - ./config:/app/config
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:13120/health"]
      interval: 30s
      timeout: 3s
      start_period: 5s
      retries: 3
