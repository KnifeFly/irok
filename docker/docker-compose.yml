services:
  aiclient-kiro:
    build:
      context: ..
      dockerfile: Dockerfile
    image: aiclient-kiro:latest
    container_name: aiclient-kiro
    restart: unless-stopped
    ports:
      - "13120:13120"
      - "19876-19880:19876-19880"
    volumes:
      - ../config:/app/config
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:13120/health"]
      interval: 30s
      timeout: 3s
      start_period: 5s
      retries: 3
